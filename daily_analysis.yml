name: Daily Stock Analysis

on:
  # Runs every day at 01:30 UTC = 07:00 AM IST
  schedule:
    - cron: "30 1 * * 1-5"   # Monday–Friday only (NSE trading days)

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Check out your repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the analysis agent
      # Supabase credentials are stored in GitHub Secrets
      - name: Run stock analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python agent/analyze.py
