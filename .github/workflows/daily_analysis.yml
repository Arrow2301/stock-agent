name: Daily Stock Analysis

on:
  # Scheduled at 01:00 UTC = 06:30 AM IST
  # GitHub free tier can delay up to 1-2 hours, so worst case ~8:30 AM IST
  # Still before NSE market open at 9:15 AM IST
  schedule:
    - cron: "0 1 * * 1-5"   # Monday–Friday 01:00 UTC = 06:30 AM IST

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent/analyze.py
