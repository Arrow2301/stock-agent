name: Midday Alert Checker

on:
  schedule:
    # Run 1: 05:30 UTC = ~11:00-11:30 AM IST (accounting for GitHub delay)
    - cron: "30 5 * * 1-5"
    # Run 2: 08:30 UTC = ~2:30-3:00 PM IST (before 3:30 PM market close)
    - cron: "30 8 * * 1-5"

  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run midday alert checker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent/check_alerts.py
